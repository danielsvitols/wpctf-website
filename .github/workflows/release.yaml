name: Release on Tag

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build-and-push:
    permissions:
      contents: read
      packages: write

    uses: neteye-platform/repo-commons/.github/workflows/build-docker-image.yaml@780b87e69d8b7d2b46ddec36a674f24218d81022 # main
    with:
      working-directory: "."
      dockerfile-path: "./Dockerfile"
      image-name: ${{ github.event.repository.name }}
      push: true
    secrets: inherit
